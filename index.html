<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hundetur</title>
</head>
<body>

<header>
  <h1>🐾 Hundetur</h1>
  <nav>
    <a href="#hjem">Hjem</a>
    <a href="#tjenester">Tjenester</a>
    <a href="#priser">Priser</a>
    <a href="#booking">Booking</a>
    <a href="#kontakt">Kontakt</a>
  </nav>
</header>

<section id="hjem">
  <h2>Trygg og omsorgsfull hundelufting</h2>
  <p>Vi passer på at hunden din får en fin tur med frisk luft, lek og masse omsorg.</p>

  <button>🐶 Book hundetur</button>
</section>

<section id="tjenester">
  <h2>Våre tjenester</h2>

  <p>🐕 30 minutter – 40 kr</p>
  <p>🐕 60 minutter – 65 kr</p>
  <p>🐕 90 minutter – 80 kr</p>
  <p> 💰 pris kan diskuteres</p>
</section>

<section id="booking">

</section>
  <h2>📅 Book hundetur</h2>

<form action="https://formspree.io/f/mlgyokpa" method="POST">

<input type="text" name="navn" placeholder="Navn" required><br><br>

<input type="email" name="epost" placeholder="E-post" required><br><br>

<input type="tel" name="telefon" placeholder="Telefonnummer" required><br><br>

<input type="text" name="hund" placeholder="Hundens navn" required><br><br>

<label>📅 Dato:</label><br>
<input type="date" name="dato" required><br><br>

<label>⏰ Tid:</label><br>
<input type="time" name="tid" required><br><br>

<label>🐾 Velg tur:</label><br>
<select name="tur">
  <option>30 minutter – pris kan diskutere</option>
  <option>60 minutter – pris kan diksuteres</option>
  <option>90 minutter – pris kan diskuteres</option>
  <option> tid og pris kan diskuteres</option>
</select>

<br><br>

<textarea name="melding" placeholder="Ekstra informasjon om hunden"></textarea>

<br><br>

<button type="submit">🐶 Send booking</button>

</form> 
</html>
